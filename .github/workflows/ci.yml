name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Maven verify on Java 8
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Verify and install library
        run: mvn --batch-mode --no-transfer-progress clean install

      - name: Build runnable demo
        run: mvn --batch-mode --no-transfer-progress -f examples/spring-boot-demo/pom.xml clean package
