services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --save '' --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  demo:
    build:
      context: ../..
      dockerfile: examples/spring-boot-demo/Dockerfile
    environment:
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
