server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:commonpay;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/ddl-mysql.sql
      data-locations: classpath:data.sql
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

common:
  pay:
    web:
      enabled: true
    reconcile:
      enabled: false

logging:
  level:
    io.github.commonpay: INFO
